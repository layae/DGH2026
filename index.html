<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>DGH 2026 Study App</title>
<style>
/* ── Reset & Variables ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --app-bg:#F8F9FA;
  --card-bg:#FFFFFF;
  --border:#E2E8F0;
  --text:#1A202C;
  --muted:#718096;
  --accent:#2B6CB0;
  --header-h:64px;
  --tab-h:52px;
  --search-h:52px;
  --radius:12px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
}
@media(prefers-color-scheme:dark){
  :root{
    --app-bg:#0D1117;
    --card-bg:#161B22;
    --border:#30363D;
    --text:#E6EDF3;
    --muted:#8B949E;
    --accent:#58A6FF;
    --shadow:0 1px 3px rgba(0,0,0,.4);
  }
}
html{height:100%;height:-webkit-fill-available;}
body{
  font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:var(--app-bg);
  color:var(--text);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  height:100dvh;
  display:flex;flex-direction:column;overflow:hidden;
}

/* ── Header ────────────────────────────────────────────────────── */
.header{
  position:-webkit-sticky;position:sticky;top:0;z-index:100;
  height:var(--header-h);
  background:var(--card-bg);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.header-title{
  font-size:17px;font-weight:700;letter-spacing:-.3px;
  color:var(--text);
}
.header-title span{color:var(--accent);}
.header-stats{font-size:12px;color:var(--muted);text-align:right;line-height:1.3;}

/* ── Search ─────────────────────────────────────────────────────── */
.search-wrap{
  padding:10px 16px;
  background:var(--card-bg);
  border-bottom:1px solid var(--border);
}
.search-inner{position:relative;}
.search-icon{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:16px;pointer-events:none;
}
#searchInput{
  width:100%;
  height:40px;
  padding:0 12px 0 38px;
  background:var(--app-bg);
  border:1px solid var(--border);
  border-radius:10px;
  font-size:15px;
  color:var(--text);
  outline:none;
  font-family:inherit;
  -webkit-appearance:none;
}
#searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(43,108,176,.15);}
#searchInput::placeholder{color:var(--muted);}
.search-clear{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);font-size:18px;
  cursor:pointer;padding:4px;display:none;min-width:44px;min-height:44px;
  display:flex;align-items:center;justify-content:center;
}

/* ── Category Tabs ──────────────────────────────────────────────── */
.tabs-wrap{
  background:var(--card-bg);
  border-bottom:1px solid var(--border);
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tabs{display:flex;padding:8px 12px;gap:8px;width:max-content;min-width:100%;}
.tab{
  flex-shrink:0;
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;
  border-radius:20px;
  border:1.5px solid transparent;
  background:var(--app-bg);
  color:var(--muted);
  font-size:13px;font-weight:500;
  cursor:pointer;
  min-height:44px;
  transition:all .15s;
  font-family:inherit;
}
.tab.active{
  background:var(--bg);
  color:var(--c);
  border-color:var(--c);
  font-weight:600;
}
.tab-label{white-space:nowrap;}
.tab-count{
  background:rgba(0,0,0,.08);
  color:inherit;
  font-size:11px;font-weight:600;
  padding:1px 6px;border-radius:10px;
  min-width:22px;text-align:center;
}
.tab.active .tab-count{background:var(--c);color:#fff;}
@media(prefers-color-scheme:dark){
  .tab{background:var(--card-bg);}
  .tab.active{background:color-mix(in srgb,var(--bg) 20%,transparent);}
  .tab-count{background:rgba(255,255,255,.1);}
}

/* ── Main Scroll Container ──────────────────────────────────────── */
.main{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:12px 16px 24px;
  scroll-behavior:smooth;
  min-height:0;
}

/* ── Progress Bar ───────────────────────────────────────────────── */
.progress-bar-wrap{
  padding:8px 16px;
  background:var(--card-bg);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.progress-track{
  flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--accent);border-radius:3px;
  transition:width .4s ease;
}
.progress-text{font-size:12px;color:var(--muted);white-space:nowrap;}

/* ── Subcat Sections ────────────────────────────────────────────── */
.subcat-section{margin-bottom:20px;}
.subcat-label{
  font-size:11px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);
  padding:8px 4px 6px;
  display:flex;align-items:center;justify-content:space-between;
}
.subcat-label span{font-weight:400;font-size:11px;}

/* ── Chapter Cards ──────────────────────────────────────────────── */
.chapter-list{display:flex;flex-direction:column;gap:8px;}
.chapter-card{
  display:flex;align-items:center;gap:12px;
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:12px 14px;
  cursor:pointer;
  text-decoration:none;
  color:inherit;
  box-shadow:var(--shadow);
  transition:border-color .12s,box-shadow .12s;
  min-height:56px;
}
.chapter-card:hover{
  border-color:var(--accent);
  box-shadow:0 2px 8px rgba(43,108,176,.12);
}
.chapter-card.done{
  opacity:.65;
  background:var(--app-bg);
}
.chapter-card.done .card-title{text-decoration:line-through;color:var(--muted);}
.card-check{
  flex-shrink:0;width:22px;height:22px;
  border:2px solid var(--border);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:all .15s;
  min-width:44px;min-height:44px;
  margin:-11px -11px -11px -11px;
  padding:11px;
}
.chapter-card.done .card-check{
  border-color:var(--accent);
  color:var(--accent);
}
.card-body{flex:1;min-width:0;}
.card-title{font-size:14px;font-weight:500;line-height:1.35;}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.card-arrow{
  flex-shrink:0;color:var(--muted);font-size:14px;
  padding:0 4px;
}

/* ── Empty State ────────────────────────────────────────────────── */
.empty{
  text-align:center;padding:60px 20px;color:var(--muted);
}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-text{font-size:16px;font-weight:500;}
.empty-sub{font-size:13px;margin-top:6px;}

/* ── Search result banner ───────────────────────────────────────── */
.search-result-banner{
  font-size:12px;color:var(--muted);
  padding:4px 4px 8px;
}

/* ── Hidden ─────────────────────────────────────────────────────── */
.hidden{display:none!important;}
</style>
</head>

  hum: {label:"Humanitarian Medicine",        color:"#92400E"},
  wch: {label:"Women's & Child Health",       color:"#6B21A8"},
};

let activeCat = 'all';
let searchQ = '';

// ── localStorage helpers ────────────────────────────────────────────
const LS_KEY = 'dgh2026_done';
function getDone() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); }
  catch { return {}; }
}
function setDone(d) { localStorage.setItem(LS_KEY, JSON.stringify(d)); }
function toggleDone(fname, e) {
  e.preventDefault(); e.stopPropagation();
  const d = getDone();
  d[fname] = !d[fname];
  setDone(d);
  render();
}

// ── Progress ────────────────────────────────────────────────────────
function updateProgress() {
  const d = getDone();
  const total = CHAPTERS.length;
  const done = Object.values(d).filter(Boolean).length;
  const pct = Math.round(done / total * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total + ' done (' + pct + '%)';
  document.getElementById('headerStats').textContent = done + '/' + total + ' done';
}

// ── Filter ──────────────────────────────────────────────────────────
function getVisible() {
  const q = searchQ.toLowerCase().replace(/\s+/g,' ').trim();
  return CHAPTERS.filter(ch => {
    const catMatch = activeCat === 'all' || ch.c === activeCat;
    if (!catMatch) return false;
    if (!q) return true;
    return ch.t.toLowerCase().includes(q) || ch.s.toLowerCase().includes(q) || ch.f.toLowerCase().includes(q);
  });
}

// ── Render ──────────────────────────────────────────────────────────
function render() {
  const done = getDone();
  const visible = getVisible();
  const main = document.getElementById('main');

  if (!visible.length) {
    main.innerHTML = `<div class="empty">
      <div class="empty-icon">&#128269;</div>
      <div class="empty-text">No chapters found</div>
      <div class="empty-sub">Try a different search term</div>
    </div>`;
    updateProgress();
    return;
  }

  // Group by subcategory
  const groups = {};
  const groupOrder = [];
  visible.forEach(ch => {
    if (!groups[ch.s]) { groups[ch.s] = []; groupOrder.push(ch.s); }
    groups[ch.s].push(ch);
  });

  let html = '';
  if (searchQ) {
    html += `<div class="search-result-banner">${visible.length} result${visible.length!==1?'s':''} for "<strong>${escHtml(searchQ)}</strong>"</div>`;
  }

  groupOrder.forEach(sub => {
    const items = groups[sub];
    const doneCount = items.filter(ch => done[ch.f]).length;
    html += `<div class="subcat-section">
      <div class="subcat-label">
        ${escHtml(sub)}
        <span>${doneCount}/${items.length}</span>
      </div>
      <div class="chapter-list">`;

    items.forEach(ch => {
      const isDone = !!done[ch.f];
      html += `<a class="chapter-card${isDone?' done':''}" href="${ch.f}" onclick="markVisited('${ch.f}')">
        <div class="card-check" onclick="toggleDone('${ch.f}',event)" title="${isDone?'Mark undone':'Mark done'}">
          ${isDone ? '&#10003;' : ''}
        </div>
        <div class="card-body">
          <div class="card-title">${escHtml(ch.t)}</div>
          <div class="card-sub">${escHtml(ch.s)}</div>
        </div>
        <div class="card-arrow">&#8250;</div>
      </a>`;
    });

    html += `</div></div>`;
  });

  main.innerHTML = html;
  updateProgress();
}

function markVisited(fname) {
  // Auto-mark as done when opened (optional: remove to keep manual-only)
  // const d = getDone(); d[fname] = true; setDone(d);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Tab switch ──────────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  activeCat = btn.dataset.cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === btn));
  render();
});

// ── Search ──────────────────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');

searchInput.addEventListener('input', () => {
  searchQ = searchInput.value;
  searchClear.style.display = searchQ ? 'flex' : 'none';
  // Switch to All when searching
  if (searchQ && activeCat !== 'all') {
    activeCat = 'all';
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.cat === 'all'));
  }
  render();
});

function clearSearch() {
  searchInput.value = '';
  searchQ = '';
  searchClear.style.display = 'none';
  searchInput.focus();
  render();
}

// ── Init ────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
